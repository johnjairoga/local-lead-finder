services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: local_lead_finder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/local_lead_finder?schema=public
      NODE_ENV: production
      DOCKER: "true"
      RESULTS_DIR: /app/results
      MAX_CONCURRENT_JOBS: 1
      STUCK_JOB_MINUTES: 10
      QUEUE_POLL_INTERVAL_MS: 5000
      QUEUE_LOCK_TTL_MS: 10000
      POLL_INTERVAL_MS: 2000
    volumes:
      - ./results:/app/results
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
