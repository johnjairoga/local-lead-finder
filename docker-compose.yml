services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DOCKER: "true"
      RESULTS_DIR: /app/results
      MAX_CONCURRENT_JOBS: 1
      STUCK_JOB_MINUTES: 10
      QUEUE_POLL_INTERVAL_MS: 5000
      QUEUE_LOCK_TTL_MS: 10000
      POLL_INTERVAL_MS: 2000
    volumes:
      - ./results:/app/results
